name: Sync to Hugging Face
on: [push, workflow_dispatch]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://AnushreeOne:$HF_TOKEN@huggingface.co/spaces/AnushreeOne/MediAssist main --force
